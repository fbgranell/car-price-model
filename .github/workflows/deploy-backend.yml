name: Deploy backend to Hugging Face

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"
          git lfs install

          git clone https://fbgranell:${HF_TOKEN}@huggingface.co/spaces/fbgranell/car-price-api hf_space
          rsync -av --delete --exclude='.git' --exclude-from='backend/.dockerignore' backend/ hf_space/
          cd hf_space
          git add .
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy from GitHub Actions (${{ github.sha }})"
            git push
          fi
